<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо жанымсол! ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff1493, #ff69b4, #ffb6c1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Анимированные сердечки на фоне */
        .heart-bg {
            position: fixed;
            font-size: 50px;
            color: rgba(255, 255, 255, 0.3);
            animation: float-bg 6s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes float-bg {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(10deg);
            }
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            width: 100%;
        }

        .photo-container {
            width: 400px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
            position: relative;
            border: 5px solid rgba(255, 255, 255, 0.5);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .photo-container img.active {
            opacity: 1;
        }

        .message {
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            color: #fff0f5;
            text-shadow: 3px 3px 6px rgba(255, 20, 147, 0.6),
                         0 0 20px rgba(255, 105, 180, 0.8);
            line-height: 1.5;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 20, 147, 0.8);
            }
        }

        /* Плавающие сердечки */
        .floating-heart {
            position: fixed;
            font-size: 40px;
            animation: rise 4s infinite ease-out;
            z-index: 5;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .photo-container {
                width: 300px;
                height: 300px;
            }
            
            .message {
                font-size: 1.3em;
            }
        }

        @media (max-width: 480px) {
            .photo-container {
                width: 250px;
                height: 250px;
            }
            
            .message {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="photo-container">
            <img src="photo1.png" class="active" alt="Photo 1">
            <img src="photo2.png" alt="Photo 2">
        </div>
        <div class="message">
            Пасибааа жанымсол люблюю тебя очень очень сильно жаным спасибо что простилаа🥹🥹🥹❤️❤️❤️❤️❤️
        </div>
    </div>

    <script>
        // Переключение фотографий
        const images = document.querySelectorAll('.photo-container img');
        let currentImage = 0;

        setInterval(() => {
            images[currentImage].classList.remove('active');
            currentImage = (currentImage + 1) % images.length;
            images[currentImage].classList.add('active');
        }, 500); // Меняем каждые 500мс для эффекта гифки

        // Создание фоновых сердечек
        function createBackgroundHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '💕';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 100 + 'vh';
            heart.style.animationDelay = Math.random() * 3 + 's';
            document.body.appendChild(heart);
        }

        // Создаем несколько фоновых сердечек
        for (let i = 0; i < 15; i++) {
            createBackgroundHeart();
        }

        // Создание плавающих сердечек
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Создаем плавающие сердечки периодически
        setInterval(createFloatingHeart, 400);
        for (let i = 0; i < 10; i++) {
            setTimeout(createFloatingHeart, i * 300);
        }
    </script>
</body>
</html>
